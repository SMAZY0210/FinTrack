<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1629"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4a0"/>
      <stop offset="100%" stop-color="#00a87e"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner glow top-left -->
  <ellipse cx="16" cy="14" rx="22" ry="18" fill="#00d4a0" opacity="0.07"/>

  <!-- "P" letter -->
  <text x="8" y="46"
    font-family="'Georgia', serif"
    font-size="38"
    font-weight="700"
    fill="url(#accent)"
    letter-spacing="-1">P</text>

  <!-- "G" letter — offset, slightly smaller, lighter -->
  <text x="30" y="46"
    font-family="'Georgia', serif"
    font-size="28"
    font-weight="400"
    fill="#ffffff"
    opacity="0.55">G</text>

  <!-- Emerald underline accent bar -->
  <rect x="8" y="50" width="48" height="3" rx="1.5" fill="url(#accent)" opacity="0.9"/>
</svg>
